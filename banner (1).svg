<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0714"/>
      <stop offset="50%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#170826"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="cardfill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect x="0" y="0" width="1000" height="300" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="1000" height="300" fill="url(#bg)"/>

    <!-- decorative circles -->
    <circle cx="850" cy="60" r="160" fill="#d946ef" opacity="0.10"/>
    <circle cx="950" cy="220" r="110" fill="#a855f7" opacity="0.10"/>
    <circle cx="60" cy="260" r="90" fill="#00e5ff" opacity="0.06"/>

    <!-- floating pill shapes (right side, echoing reference) -->
    <rect x="790" y="110" width="150" height="40" rx="20" fill="#ffffff" opacity="0.06"/>
    <rect x="850" y="165" width="90" height="30" rx="15" fill="#ffffff" opacity="0.05"/>

    <!-- diagonal lines accent -->
    <line x1="760" y1="40" x2="960" y2="240" stroke="#d946ef" stroke-width="1" opacity="0.15"/>
    <line x1="800" y1="20" x2="1000" y2="220" stroke="#00e5ff" stroke-width="1" opacity="0.12"/>
  </g>

  <!-- glass card -->
  <rect x="60" y="55" width="620" height="190" rx="18" fill="url(#cardfill)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <!-- top accent bar -->
  <rect x="95" y="90" width="150" height="6" rx="3" fill="url(#accent)"/>

  <!-- name -->
  <text x="95" y="150" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Mujahanatin Solekhah</text>

  <!-- subtitle -->
  <text x="95" y="185" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#e879f9">Web Developer &#183; Network Enthusiast &#183; IT Student</text>

  <!-- skill badges -->
  <g transform="translate(95,205)">
    <!-- badge 1: code / web -->
    <rect x="0" y="0" width="46" height="36" rx="10" fill="#ffffff" opacity="0.08"/>
    <text x="23" y="24" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#d946ef" text-anchor="middle" font-weight="700">&lt;/&gt;</text>

    <!-- badge 2: react-like atom -->
    <rect x="56" y="0" width="46" height="36" rx="10" fill="#ffffff" opacity="0.08"/>
    <g transform="translate(79,18)">
      <ellipse rx="13" ry="5" fill="none" stroke="#a855f7" stroke-width="1.5"/>
      <ellipse rx="13" ry="5" fill="none" stroke="#a855f7" stroke-width="1.5" transform="rotate(60)"/>
      <ellipse rx="13" ry="5" fill="none" stroke="#a855f7" stroke-width="1.5" transform="rotate(120)"/>
      <circle r="2.5" fill="#a855f7"/>
    </g>

    <!-- badge 3: network/plug -->
    <rect x="112" y="0" width="46" height="36" rx="10" fill="#ffffff" opacity="0.08"/>
    <g transform="translate(135,18)" stroke="#00e5ff" stroke-width="1.6" fill="none">
      <circle r="9"/>
      <line x1="0" y1="-9" x2="0" y2="-14"/>
      <line x1="0" y1="9" x2="0" y2="14"/>
      <line x1="-9" y1="0" x2="-14" y2="0"/>
      <line x1="9" y1="0" x2="14" y2="0"/>
    </g>
  </g>
</svg>
