<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" role="img">
<title>StudyBuddy Logo</title>
<desc>Logo StudyBuddy dengan ikon buku, pet, bintang, dan teks StudyBuddy</desc>

<style>
  @media (prefers-color-scheme: dark) {
    .bg-soft  { fill: #2D2D54; }
    .txt-main { fill: #E2E8F0; }
    .txt-tag  { fill: #A0AEC0; }
    .book-ln  { stroke: #4a5080; }
  }
</style>

<!-- Lingkaran background ikon -->
<circle cx="160" cy="160" r="112" fill="#EEF2FF" class="bg-soft"/>

<!-- Buku kiri -->
<rect x="96" y="108" width="54" height="72" rx="5" fill="#6C63FF"/>
<rect x="102" y="113" width="44" height="62" rx="3" fill="#fff"/>
<rect x="101" y="108" width="7" height="72" rx="3" fill="#5a52e0"/>
<line x1="112" y1="126" x2="138" y2="126" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" class="book-ln"/>
<line x1="112" y1="136" x2="138" y2="136" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" class="book-ln"/>
<line x1="112" y1="146" x2="134" y2="146" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" class="book-ln"/>
<line x1="112" y1="156" x2="136" y2="156" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" class="book-ln"/>
<line x1="112" y1="166" x2="130" y2="166" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" class="book-ln"/>

<!-- Buku kanan (rotasi) -->
<g transform="rotate(14 178 145)">
  <rect x="156" y="112" width="46" height="66" rx="5" fill="#9F7AEA"/>
  <rect x="161" y="117" width="37" height="56" rx="3" fill="#fff"/>
  <rect x="160" y="112" width="6" height="66" rx="3" fill="#7c5cbf"/>
  <line x1="170" y1="129" x2="191" y2="129" stroke="#e9d8fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="170" y1="139" x2="191" y2="139" stroke="#e9d8fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="170" y1="149" x2="188" y2="149" stroke="#e9d8fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="170" y1="159" x2="190" y2="159" stroke="#e9d8fd" stroke-width="2" stroke-linecap="round"/>
</g>

<!-- Pet (burung/ayam kecil) duduk di atas buku -->
<ellipse cx="152" cy="96" rx="17" ry="13" fill="#FBBF24"/>
<circle cx="152" cy="88" r="11" fill="#FBBF24"/>
<!-- Jengger -->
<ellipse cx="150" cy="79" rx="4" ry="5" fill="#FC8181"/>
<!-- Mata -->
<circle cx="156" cy="86" r="3.5" fill="#1A1A2E"/>
<circle cx="157" cy="85" r="1.3" fill="#fff"/>
<!-- Paruh -->
<polygon points="159,89 166,91 159,93" fill="#F97316"/>
<!-- Sayap kecil -->
<ellipse cx="141" cy="95" rx="9" ry="6" fill="#F59E0B" transform="rotate(-25 141 95)"/>

<!-- Bintang dekoratif -->
<polygon points="218,76 220,83 227,83 221.5,87 223.5,94 218,90 212.5,94 214.5,87 209,83 216,83" fill="#F6AD55"/>
<polygon points="97,200 98.5,205 104,205 99.5,208 101,213 97,210 93,213 94.5,208 90,205 95.5,205" fill="#F6AD55"/>

<!-- Titik aksen -->
<circle cx="88" cy="100" r="5.5" fill="#48BB78"/>
<circle cx="228" cy="148" r="4.5" fill="#F6AD55"/>
<circle cx="93" cy="218" r="6" fill="#6C63FF" opacity="0.45"/>
<circle cx="232" cy="200" r="3.5" fill="#FC8181" opacity="0.7"/>
<circle cx="218" cy="210" r="5" fill="#48BB78" opacity="0.5"/>

<!-- TEKS: StudyBuddy -->
<text x="298" y="148"
      font-family="'Segoe UI', system-ui, sans-serif"
      font-size="58" font-weight="700"
      fill="#1A1A2E" class="txt-main">Study</text>

<text x="298" y="208"
      font-family="'Segoe UI', system-ui, sans-serif"
      font-size="58" font-weight="700"
      fill="#6C63FF">Buddy</text>

<!-- Garis dekoratif -->
<rect x="298" y="222" width="330" height="3" rx="1.5" fill="#6C63FF" opacity="0.18"/>

<!-- Tagline -->
<text x="298" y="250"
      font-family="'Segoe UI', system-ui, sans-serif"
      font-size="15" font-weight="400"
      fill="#718096" class="txt-tag">Catatan · Chat · Jadwal · Virtual Pet</text>

<!-- Pill badge -->
<rect x="298" y="265" width="160" height="26" rx="13" fill="#6C63FF" opacity="0.1"/>
<text x="378" y="282"
      font-family="'Segoe UI', system-ui, sans-serif"
      font-size="12" font-weight="500"
      fill="#6C63FF" text-anchor="middle">Teman Belajar Digitalmu</text>

</svg>
